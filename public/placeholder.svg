<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" fill="none">
  <!-- Professional Deep Background -->
  <rect width="800" height="1000" fill="#1A1A1A"/>
  
  <!-- Defined Border -->
  <rect x="20" y="20" width="760" height="960" stroke="#C9A962" stroke-width="1" stroke-opacity="0.2"/>
  
  <!-- Background Pattern -->
  <circle cx="400" cy="500" r="350" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.15"/>
  <circle cx="400" cy="500" r="250" stroke="#C9A962" stroke-width="0.5" stroke-opacity="0.1"/>
  
  <!-- Central Branding - Scaled Up for Better Visibility -->
  <g transform="translate(400, 440) scale(1.8)">
    <path d="M-50 -80C-50 -107.614 -27.6142 -130 0 -130C27.6142 -130 50 -107.614 50 -80V20C50 47.6142 27.6142 70 0 70C-27.6142 70 -50 47.6142 -50 20V-80Z" 
          stroke="#C9A962" stroke-width="2.5" stroke-opacity="0.7"/>
    
    <!-- Branding Text -->
    <text y="130" fill="#C9A962" fill-opacity="0.9" font-family="Oswald, sans-serif" font-size="48" font-weight="500" text-anchor="middle" letter-spacing="0.2em">T.Ô.I</text>
    <text y="175" fill="#C9A962" fill-opacity="0.6" font-family="Lora, serif" font-size="18" font-style="italic" text-anchor="middle" letter-spacing="0.1em">COFFEE &amp; TEA</text>
  </g>
  
