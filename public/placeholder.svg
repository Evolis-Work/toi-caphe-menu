  <path d="M740 60V20H700" stroke="#C9A962" stroke-width="2" stroke-opacity="0.4"/>
  <path d="M20 940V980H60" stroke="#C9A962" stroke-width="2" stroke-opacity="0.4"/>
  <path d="M740 940V980H700" stroke="#C9A962" stroke-width="2" stroke-opacity="0.4"/>
